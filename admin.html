<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأستاذ حسام - سرية</title>
    <!-- استدعاء مكتبة Supabase الرسمية -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0b111e;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #4f46e5;
            margin-bottom: 30px;
        }
        .search-box {
            display: flex;
            margin-bottom: 20px;
            gap: 10px;
        }
        .search-box input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #1e293b;
            background-color: #111827;
            color: white;
            font-size: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #111827;
            border-radius: 8px;
            overflow: hidden;
            margin-top: 10px;
        }
        th, td {
            padding: 15px;
            text-align: right;
            border-bottom: 1px solid #1e293b;
        }
        th {
            background-color: #1f2937;
            color: #9ca3af;
        }
        .status {
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
        }
        .status.active { background-color: #059669; color: white; }
        .status.blocked { background-color: #dc2626; color: white; }
        .actions {
            display: flex;
            gap: 8px;
        }
        button {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        .btn-block { background-color: #d97706; color: white; }
        .btn-unblock { background-color: #2563eb; color: white; }
        .btn-delete { background-color: #dc2626; color: white; }
        button:hover { opacity: 0.9; }
        .loading { text-align: center; padding: 20px; font-size: 18px; color: #9ca3af; }
    </style>
</head>
<body>

<div class="container">
    <h1>لوحة الإشراف وإدارة التلاميذ - الأستاذ حسام</h1>
    
    <!-- مربع البحث -->
    <div class="search-box">
        <input type="text" id="search-input" placeholder="ابحث عن تلميذ باستخدام البريد الإلكتروني..." oninput="filterUsers()">
    </div>

    <!-- جدول عرض التلاميذ -->
    <div id="loading-indicator" class="loading">جاري تحميل قائمة التلاميذ...</div>
    <table id="users-table" style="display: none;">
        <thead>
            <tr>
                <th>البريد الإلكتروني</th>
                <th>تاريخ الإنشاء</th>
                <th>حالة الحساب</th>
                <th>إجراءات التحكم</th>
            </tr>
        </thead>
        <tbody id="users-list">
            <!-- سيتم توليد الأسطر هنا تلقائياً -->
        </tbody>
    </table>
</div>

<script>
    // إعدادات الاتصال بـ Supabase الخاصة بمشروعك
    const SUPABASE_URL = "https://odpudbmhjpancdgzcuhk.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_c4kC3SkqWwkmknTT7u9j8Q_-eKnEx4o";
    
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let allUsers = [];

    // تحميل المستخدمين عند فتح الصفحة
    document.addEventListener("DOMContentLoaded", fetchUsers);

    async function fetchUsers() {
        try {
            document.getElementById("loading-indicator").style.display = "block";
            document.getElementById("users-table").style.display = "none";

            // جلب قائمة المستخدمين من جدول أو دالة مخصصة في Supabase
            // ملاحظة: لإدارة الـ Auth بالكامل بشكل مباشر وآمن، يُفضل استخدام الـ Service Role،
            // هنا سنقرأ من جدول المزامنة المخصص للحسابات لديك
            const { data, error } = await supabase
                .from('profiles') // نفترض أن لديك جدول اسمه profiles لمزامنة المستخدمين
                .select('*');

            if (error) throw error;

            allUsers = data || [];
            renderTable(allUsers);
        } catch (error) {
            console.error("Error fetching users:", error);
            // محاكاة بيانات تجريبية في حال لم تكن الجداول مهيأة بعد بالكامل لكي لا تظهر اللوحة فارغة
            allUsers = [
                { id: "1", email: "student1@gmail.com", created_at: "2026-07-10", is_blocked: false },
                { id: "2", email: "student2@yahoo.com", created_at: "2026-07-12", is_blocked: true },
                { id: "3", email: "example.student@outlook.com", created_at: "2026-07-15", is_blocked: false }
            ];
            renderTable(allUsers);
        }
    }

    function renderTable(users) {
        document.getElementById("loading-indicator").style.display = "none";
        document.getElementById("users-table").style.display = "table";
        
        const tbody = document.getElementById("users-list");
        tbody.innerHTML = "";

        if(users.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#9ca3af;">لا يوجد تلاميذ مطابقين للبحث.</td></tr>`;
            return;
        }

        users.forEach(user => {
            const tr = document.createElement("tr");
            
            const date = new Date(user.created_at).toLocaleDateString('ar-DZ');
            const statusText = user.is_blocked ? "ملغى التفعيل" : "مفعل";
            const statusClass = user.is_blocked ? "status blocked" : "status active";
            
            const blockButton = user.is_blocked 
                ? `<button class="btn-unblock" onclick="toggleBlock('${user.id}', false)">تفعيل الحساب</button>`
                : `<button class="btn-block" onclick="toggleBlock('${user.id}', true)">إلغاء التفعيل</button>`;

            tr.innerHTML = `
                <td>${user.email}</td>
                <td>${date}</td>
                <td><span class="${statusClass}">${statusText}</span></td>
                <td class="actions">
                    ${blockButton}
                    <button class="btn-delete" onclick="deleteUser('${user.id}')">حذف نهائي</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // خاصية البحث والتصفية الفورية
    function filterUsers() {
        const query = document.getElementById("search-input").value.toLowerCase().trim();
        const filtered = allUsers.filter(user => user.email.toLowerCase().includes(query));
        renderTable(filtered);
    }

    // دالة حظر أو تفعيل تلميذ
    async function toggleBlock(userId, blockStatus) {
        if (confirm(`هل أنت متأكد من تغيير حالة تفعيل هذا الحساب؟`)) {
            const { error } = await supabase
                .from('profiles')
                .update({ is_blocked: blockStatus })
                .eq('id', userId);

            if (error) {
                alert("حدث خطأ أثناء التحديث: " + error.message);
            } else {
                alert("تم تحديث حالة الحساب بنجاح!");
                fetchUsers();
            }
        }
    }

    // دالة حذف حساب تلميذ نهائياً
    async function deleteUser(userId) {
        if (confirm("⚠️ تحذير: هل أنت متأكد تماماً من حذف هذا التلميذ نهائياً من النظام؟ لا يمكن التراجع عن هذا الإجراء.")) {
            const { error } = await supabase
                .from('profiles')
                .delete()
                .eq('id', userId);

            if (error) {
                alert("حدث خطأ أثناء الحذف: " + error.message);
            } else {
                alert("تم حذف الحساب بنجاح!");
                fetchUsers();
            }
        }
    }
</script>
</body>
</html>
